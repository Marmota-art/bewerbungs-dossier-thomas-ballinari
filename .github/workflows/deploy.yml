# GitHub Actions Workflow for deploying the React application to GitHub Pages
# This workflow uses the modern, secure, and officially recommended GitHub Pages deployment method.

name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main # Trigger on pushes to the main branch
  workflow_dispatch: # Allow manual triggers from the Actions tab

# Set permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queue.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Build Application
        run: npm run build
        env:
          # If you have non-sensitive client configuration env variables, you can inject them here.
          # Note: Server-side secrets (like GEMINI_API_KEY) cannot be accessed directly in the browser on GitHub Pages.
          NODE_ENV: production

      - name: Setup GitHub Pages Config
        uses: actions/configure-pages@v5

      - name: Upload Static Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Vite builds assets by default into the 'dist' directory
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
      
      # Optional: Post a success message to the log
      - name: Log Deployment Success
        run: echo "Successfully deployed to ${{ steps.deployment.outputs.page_url }}"
