# Prüft jeden Push/PR: baut die App (ohne zu deployen).
# Deployment übernimmt Netlify automatisch bei Push auf main (Git-Anbindung im Netlify-Dashboard).

name: CI – Build prüfen

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci || npm install
      - run: npm run build
        env:
          NODE_ENV: production
