<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta name="theme-color" content="#10b981" />
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Link-Vorschau (WhatsApp, LinkedIn, iMessage, …) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Bewerbung Thomas Ballinari" />
    <meta property="og:title" content="Bewerbung Thomas Ballinari" />
    <meta
      property="og:description"
      content="Interaktives Dossier – Lebenslauf, Projekte, Zertifikate und Frag Thomas."

    <meta name="twitter:card" content="summary_large_image" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

  <body class="bg-slate-950 text-slate-100 antialiased overflow-x-hidden">
    <div id="root"></div>
    <!-- Hidden form for Netlify Forms detection in SPAs -->
    <form name="contact" data-netlify="true" data-netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <input type="text" name="company" />
      <textarea name="message"></textarea>
      <input type="text" name="bot-field" />
    </form>
    <script type="module" src="/src/main.tsx"></script>
