[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Netlify-Subdomain → Primary Domain (thomoro.com)
[[redirects]]
  from = "https://thomas-ballinari-ai-app.netlify.app/*"
  to = "https://thomoro.com/:splat"
  status = 301
  force = true

# Domain-Redirects (Apex ↔ www) nur im Netlify-Dashboard unter Domain management
# einstellen – nicht hier, sonst Redirect-Schleife (ERR_TOO_MANY_REDIRECTS).

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Content-Type = "application/manifest+json"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
