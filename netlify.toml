[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  NETLIFY = "true"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"
  external_node_modules = ["express"]

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# Nach Domain-Anbindung in Netlify: Apex → www (Primary Domain: www.thomoro.com)
[[redirects]]
  from = "http://thomoro.com/*"
  to = "https://www.thomoro.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "https://thomoro.com/*"
  to = "https://www.thomoro.com/:splat"
  status = 301
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
